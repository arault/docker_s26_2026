---
name: lempstack
services:
  wwwsvc:
    image: nginx:1.31
    container_name: www
    ports:
      - 80:80
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx-conf:/etc/nginx/conf.d
    networks:
      lempnet:
        ipv4_address: 172.40.0.100
    depends_on:
      - phpsvc
      - dbsvc

  phpsvc:
    image: php:8.5-fpm
    container_name: php
    volumes:
      - ./html:/var/www/html
    networks:
      lempnet:
        ipv4_address: 172.40.0.110
    restart: unless-stopped
    depends_on:
      - dbsvc

  dbsvc:
    image: mariadb:12.3
    container_name: db
    volumes:
      - datadb:/var/lib/mysql
    env_file: mariadb.env
    networks:
      lempnet:
        ipv4_address: 172.40.0.120
    restart: unless-stopped

volumes:
  datadb:
    # si on voulait réutilisé un volume pré-existant
    # external: true

networks:
  lempnet:
    ipam:
      config:
        - subnet: 172.40.0.0/16
          gateway: 172.40.255.254
    driver_opts:
      com.docker.network.bridge.name: lempnet0
