---
name: lemp-proxy-stack

x-logging: &default-logging
  logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE}
        max-file: ${LOG_MAX_FILE}

services:
  wwwsvc:
    image: nginx:${NGINX_IMAGE_TAG}
    container_name: www
    # ports:
    #   - 80:80
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.www.rule=Host(`www.stage.local`)
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx-conf:/etc/nginx/conf.d
    networks:
      lempnet:
        ipv4_address: ${LEMPNET_PREFIX}.${NGINX_IPV4}
      proxynet:
    depends_on:
      - phpsvc
      - dbsvc
    <<: *default-logging

  phpsvc:
    image: ${PHP_MYSQL_IMAGE}:${PHP_IMAGE_TAG}
    container_name: php
    volumes:
      - ./html:/var/www/html
    networks:
      lempnet:
        ipv4_address: ${LEMPNET_PREFIX}.${PHP_IPV4}
    restart: unless-stopped
    depends_on:
      - dbsvc
    <<: *default-logging

  dbsvc:
    image: mariadb:${MARIADB_IMAGE_TAG}
    container_name: db
    volumes:
      - datadb:/var/lib/mysql
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWD}
    networks:
      lempnet:
        ipv4_address: ${LEMPNET_PREFIX}.${MARIADB_IPV4}
    restart: unless-stopped
    <<: *default-logging

volumes:
  datadb:
    # si on voulait réutilisé un volume pré-existant
    # external: true

networks:
  lempnet:
    ipam:
      config:
        - subnet: ${LEMPNET_PREFIX}.0.0/16
          gateway: ${LEMPNET_PREFIX}.255.254
    driver_opts:
      com.docker.network.bridge.name: lempnet0
  proxynet:
    external: true
